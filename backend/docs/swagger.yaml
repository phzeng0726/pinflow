          in: path
          name: id
          required: true
          type: integer
        - description: Tag ID
          in: path
          name: tagId
          required: true
          type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Detach a tag from a card
      tags:
        - tags
  /cards/pinned:
    get:
