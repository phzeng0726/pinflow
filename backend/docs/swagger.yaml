basePath: /api/v1
definitions:
  dto.AttachTagRequest:
    properties:
      tag_id:
        type: integer
    required:
      - tag_id
    type: object
  dto.CardResponse:
    properties:
      checklists:
        items:
          $ref: "#/definitions/dto.ChecklistResponse"
        type: array
      columnId:
        type: integer
      createdAt:
        type: string
      description:
        type: string
      endTime:
        type: string
      id:
        type: integer
      isPinned:
        type: boolean
      position:
        type: number
      startTime:
        type: string
      storyPoint:
        type: integer
      tags:
        items:
          $ref: "#/definitions/dto.TagResponse"
        type: array
      title:
        type: string
      updatedAt:
        type: string
    type: object
  dto.ChecklistItemResponse:
    properties:
      checklistId:
        type: integer
      completed:
        type: boolean
      id:
        type: integer
      position:
        type: number
      text:
        type: string
    type: object
  dto.ChecklistResponse:
    properties:
      cardId:
        type: integer
      completedCount:
        type: integer
      id:
        type: integer
      items:
        items:
          $ref: "#/definitions/dto.ChecklistItemResponse"
        type: array
      position:
        type: number
      title:
        type: string
      totalCount:
        type: integer
    type: object
  dto.CreateBoardRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
      - name
    type: object
  dto.CreateCardRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
      - title
    type: object
  dto.CreateChecklistItemRequest:
    properties:
      position:
        type: number
      text:
        maxLength: 500
        minLength: 1
        type: string
    required:
      - text
    type: object
  dto.CreateChecklistRequest:
    properties:
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
      - title
    type: object
  dto.CreateColumnRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
      - name
    type: object
  dto.CreateTagRequest:
    properties:
      color:
        maxLength: 50
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
      - name
    type: object
  dto.DuplicateCardRequest:
    properties:
      copyChecklists:
        type: boolean
      copySchedule:
        type: boolean
      copyTags:
        type: boolean
      pin:
        type: boolean
      position:
        description: 1-based; 0 = append to end
        type: integer
      targetColumnId:
        type: integer
      title:
        type: string
    required:
      - targetColumnId
      - title
    type: object
  dto.MoveCardRequest:
    properties:
      columnId:
        type: integer
      position:
        type: number
    required:
      - columnId
      - position
    type: object
  dto.PinnedCardResponse:
    properties:
      columnId:
        type: integer
      columnName:
        type: string
      description:
        type: string
      id:
        type: integer
      title:
        type: string
    type: object
  dto.TagResponse:
    properties:
      color:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dto.UpdateBoardRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
      - name
    type: object
  dto.UpdateCardRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      endTime:
        type: string
      startTime:
        type: string
      storyPoint:
        type: integer
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
      - title
    type: object
  dto.UpdateChecklistItemRequest:
    properties:
      completed:
        type: boolean
      position:
        type: number
      text:
        type: string
    type: object
  dto.UpdateChecklistRequest:
    properties:
      position:
        type: number
      title:
        type: string
    type: object
  dto.UpdateColumnRequest:
    properties:
      autoPin:
        type: boolean
      name:
        type: string
      position:
        type: number
    type: object
  dto.UpdateTagRequest:
    properties:
      color:
        maxLength: 50
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  model.Board:
    properties:
      columns:
        items:
          $ref: "#/definitions/model.Column"
        type: array
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  model.Card:
    properties:
      checklists:
        items:
          $ref: "#/definitions/model.Checklist"
        type: array
      columnId:
        type: integer
      createdAt:
        type: string
      description:
        type: string
      endTime:
        type: string
      id:
        type: integer
      isPinned:
        type: boolean
      position:
        type: number
      startTime:
        type: string
      storyPoint:
        type: integer
      tags:
        items:
          $ref: "#/definitions/model.Tag"
        type: array
      title:
        type: string
      updatedAt:
        type: string
    type: object
  model.Checklist:
    properties:
      cardId:
        type: integer
      id:
        type: integer
      items:
        items:
          $ref: "#/definitions/model.ChecklistItem"
        type: array
      position:
        type: number
      title:
        type: string
    type: object
  model.ChecklistItem:
    properties:
      checklistId:
        type: integer
      completed:
        type: boolean
      id:
        type: integer
      position:
        type: number
      text:
        type: string
    type: object
  model.Column:
    properties:
      autoPin:
        type: boolean
      boardId:
        type: integer
      cards:
        items:
          $ref: "#/definitions/model.Card"
        type: array
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      position:
        type: number
      updatedAt:
        type: string
    type: object
  model.Tag:
    properties:
      color:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
host: localhost:34115
info:
  contact: {}
  description: Kanban board with pin mode API
  title: Pinflow API
  version: "1.0"
paths:
  /boards:
    get:
