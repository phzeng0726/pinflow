basePath: /api/v1
definitions:
  dto.AttachTagRequest:
    properties:
      tag_id:
        type: integer
    required:
    - tag_id
    type: object
  dto.CardResponse:
    properties:
      checklists:
        items:
          $ref: '#/definitions/dto.ChecklistResponse'
        type: array
      columnId:
        type: integer
      comments:
        items:
          $ref: '#/definitions/dto.CommentResponse'
        type: array
      createdAt:
        type: string
      dependencyCount:
        type: integer
      description:
        type: string
      endTime:
        type: string
      id:
        type: integer
      isPinned:
        type: boolean
      position:
        type: number
      priority:
        type: integer
      startTime:
        type: string
      storyPoint:
        type: integer
      tags:
        items:
          $ref: '#/definitions/dto.TagResponse'
        type: array
      title:
        type: string
      updatedAt:
        type: string
    type: object
  dto.CardSearchResult:
    properties:
      boardId:
        type: integer
      boardName:
        type: string
      columnId:
        type: integer
      columnName:
        type: string
      id:
        type: integer
      title:
        type: string
    type: object
  dto.ChecklistItemResponse:
    properties:
      checklistId:
        type: integer
      completed:
        type: boolean
      id:
        type: integer
      position:
        type: number
      text:
        type: string
    type: object
  dto.ChecklistResponse:
    properties:
      cardId:
        type: integer
      completedCount:
        type: integer
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/dto.ChecklistItemResponse'
        type: array
      position:
        type: number
      title:
        type: string
      totalCount:
        type: integer
    type: object
  dto.CommentResponse:
    properties:
      authorId:
        type: string
      cardId:
        type: integer
      createdAt:
        type: string
      id:
        type: integer
      text:
        type: string
      updatedAt:
        type: string
    type: object
  dto.CreateBoardRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  dto.CreateCardRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - title
    type: object
  dto.CreateChecklistItemRequest:
    properties:
      position:
        type: number
      text:
        maxLength: 500
        minLength: 1
        type: string
    required:
    - text
    type: object
  dto.CreateChecklistRequest:
    properties:
      title:
        maxLength: 200
        minLength: 1
        type: string
    required:
    - title
    type: object
  dto.CreateColumnRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  dto.CreateCommentRequest:
    properties:
      text:
        maxLength: 5000
        minLength: 1
        type: string
    required:
    - text
    type: object
  dto.CreateDependencyRequest:
    properties:
      toCardId:
        type: integer
      type:
        $ref: '#/definitions/model.DependencyType'
    required:
    - toCardId
    - type
    type: object
  dto.CreateTagRequest:
    properties:
      color:
        maxLength: 50
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  dto.DependencyCardRef:
    properties:
      boardId:
        type: integer
      columnId:
        type: integer
      id:
        type: integer
      title:
        type: string
    type: object
  dto.DependencyResponse:
    properties:
      createdAt:
        type: string
      fromCard:
        $ref: '#/definitions/dto.DependencyCardRef'
      id:
        type: integer
      toCard:
        $ref: '#/definitions/dto.DependencyCardRef'
      type:
        $ref: '#/definitions/model.DependencyType'
    type: object
  dto.DuplicateCardRequest:
    properties:
      copyChecklists:
        type: boolean
      copySchedule:
        type: boolean
      copyTags:
        type: boolean
      pin:
        type: boolean
      position:
        description: 1-based; 0 = append to end
        type: integer
      targetColumnId:
        type: integer
      title:
        type: string
    required:
    - targetColumnId
    - title
    type: object
  dto.MoveCardRequest:
    properties:
      columnId:
        type: integer
      position:
        type: number
    required:
    - columnId
    - position
    type: object
  dto.PinnedCardResponse:
    properties:
      columnId:
        type: integer
      columnName:
        type: string
      description:
        type: string
      id:
        type: integer
      title:
        type: string
    type: object
  dto.SyncChecklistItemEntry:
    properties:
      completed:
        type: boolean
      text:
        maxLength: 500
        minLength: 1
        type: string
    required:
    - text
    type: object
  dto.SyncChecklistItemsRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/dto.SyncChecklistItemEntry'
        type: array
    required:
    - items
    type: object
  dto.TagResponse:
    properties:
      color:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  dto.UpdateBoardRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  dto.UpdateCardRequest:
    properties:
      description:
        maxLength: 2000
        type: string
      endTime:
        type: string
      priority:
        type: integer
      startTime:
        type: string
      storyPoint:
        type: integer
      title:
        maxLength: 200
        minLength: 1
        type: string
    type: object
  dto.UpdateChecklistItemRequest:
    properties:
      completed:
        type: boolean
      position:
        type: number
      text:
        type: string
    type: object
  dto.UpdateChecklistRequest:
    properties:
      position:
        type: number
      title:
        type: string
    type: object
  dto.UpdateColumnRequest:
    properties:
      autoPin:
        type: boolean
      name:
        type: string
      position:
        type: number
    type: object
  dto.UpdateCommentRequest:
    properties:
      text:
        maxLength: 5000
        minLength: 1
        type: string
    required:
    - text
    type: object
  dto.UpdateScheduleRequest:
    properties:
      endTime:
        type: string
      startTime:
        type: string
    type: object
  dto.UpdateTagRequest:
    properties:
      color:
        maxLength: 50
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
    type: object
  model.Board:
    properties:
      columns:
        items:
          $ref: '#/definitions/model.Column'
        type: array
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  model.Card:
    properties:
      checklists:
        items:
          $ref: '#/definitions/model.Checklist'
        type: array
      columnId:
        type: integer
      comments:
        items:
          $ref: '#/definitions/model.Comment'
        type: array
      createdAt:
        type: string
      dependencyCount:
        type: integer
      description:
        type: string
      endTime:
        type: string
      id:
        type: integer
      isPinned:
        type: boolean
      position:
        type: number
      priority:
        type: integer
      startTime:
        type: string
      storyPoint:
        type: integer
      tags:
        items:
          $ref: '#/definitions/model.Tag'
        type: array
      title:
        type: string
      updatedAt:
        type: string
    type: object
  model.Checklist:
    properties:
      cardId:
        type: integer
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/model.ChecklistItem'
        type: array
      position:
        type: number
      title:
        type: string
    type: object
  model.ChecklistItem:
    properties:
      checklistId:
        type: integer
      completed:
        type: boolean
      id:
        type: integer
      position:
        type: number
      text:
        type: string
    type: object
  model.Column:
    properties:
      autoPin:
        type: boolean
      boardId:
        type: integer
      cards:
        items:
          $ref: '#/definitions/model.Card'
        type: array
      createdAt:
        type: string
      id:
        type: integer
      name:
        type: string
      position:
        type: number
      updatedAt:
        type: string
    type: object
  model.Comment:
    properties:
      authorId:
        type: string
      cardId:
        type: integer
      createdAt:
        type: string
      id:
        type: integer
      text:
        type: string
      updatedAt:
        type: string
    type: object
  model.DependencyType:
    enum:
    - blocks
    - parent_of
    - duplicates
    - related_to
    type: string
    x-enum-varnames:
    - DependencyTypeBlocks
    - DependencyTypeParentOf
    - DependencyTypeDuplicates
    - DependencyTypeRelatedTo
  model.Tag:
    properties:
      color:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
host: localhost:34115
info:
  contact: {}
  description: Kanban board with pin mode API
  title: PinFlow API
  version: "1.0"
paths:
  /boards:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Board'
            type: array
      summary: List all boards
      tags:
      - boards
    post:
      consumes:
      - application/json
      parameters:
      - description: Board name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBoardRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Board'
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a board
      tags:
      - boards
  /boards/{id}:
    delete:
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a board
      tags:
      - boards
    get:
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Board'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a board by ID
      tags:
      - boards
    put:
      consumes:
      - application/json
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: integer
      - description: Board data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateBoardRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Board'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a board
      tags:
      - boards
  /boards/{id}/columns:
    post:
      consumes:
      - application/json
      parameters:
      - description: Board ID
        in: path
        name: id
        required: true
        type: integer
      - description: Column data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateColumnRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Column'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a column in a board
      tags:
      - columns
  /cards/{id}:
    delete:
      parameters:
      - description: Card ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a card
      tags:
      - cards
    get:
      parameters:
      - description: Card ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CardResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a card by ID with full details
      tags:
      - cards
    patch:
      consumes:
      - application/json
      parameters:
      - description: Card ID
        in: path
        name: id
        required: true
        type: integer
      - description: Card data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCardRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CardResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a card's title, description, story points, priority, and schedule
      tags:
      - cards
  /cards/{id}/checklists:
