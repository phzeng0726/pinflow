              $ref: "#/definitions/model.Board"
            type: array
      summary: List all boards
      tags:
        - boards
    post:
      consumes:
        - application/json
      parameters:
        - description: Board name
          in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/dto.CreateBoardRequest"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/model.Board"
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a board
      tags:
        - boards
  /boards/{id}:
    delete:
      parameters:
        - description: Board ID
          in: path
          name: id
          required: true
          type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a board
      tags:
        - boards
    get:
