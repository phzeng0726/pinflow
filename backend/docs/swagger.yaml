    post:
      consumes:
      - application/json
      parameters:
      - description: From Card ID
        in: path
        name: id
        required: true
        type: integer
      - description: Dependency data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateDependencyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.DependencyResponse'
        "400":
