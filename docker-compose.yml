version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "34115:34115"
    volumes:
      - pinflow_data:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pinflow_data:
